services:
  backend:
    build: ./backend
    container_name: BoltUbuntu-backend
    env_file: .env
    privileged: true
    pid: host
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/apt-get:/usr/bin/apt-get
      - /etc/apt:/etc/apt
      - /var/lib/apt:/var/lib/apt
      - /var/lib/dpkg:/var/lib/dpkg
      - /var/cache/apt:/var/cache/apt
      - /sbin/reboot:/sbin/reboot
    environment:
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TZ=Europe/Rome
    group_add:
      - "${DOCKER_GID:-999}"
    restart: unless-stopped

  manutenzione:
    build: ./manutenzione
    container_name: BoltUbuntu-manutenzione
    privileged: true
    pid: host
    ports:
      - "3055:3055"
    volumes:
      - ./manutenzione/buttons_config.json:/app/buttons_config.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/systemctl:/usr/bin/systemctl
      - /usr/sbin/ss:/usr/sbin/ss
      - /usr/bin/apt-get:/usr/bin/apt-get
      - /usr/bin/find:/usr/bin/find
      - /usr/bin/logrotate:/usr/bin/logrotate
      - /etc/sudoers.d:/etc/sudoers.d
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: BoltUbuntu-frontend
    env_file: .env
    ports:
      - "3061:3050"
    environment:
      - VITE_PORT=3050
      - VITE_PROXY_TARGET=http://backend:8001
      - TZ=Europe/Rome
    depends_on:
      - backend
    restart: unless-stopped
