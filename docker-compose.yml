version: '3.8'

services:
  backend:
    build: ./backend
    container_name: BoltDashPi5-backend
    privileged: true
    pid: "host"
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - JWT_SECRET=raspberry_dashboard_secret_key_2024
      - DOCKER_HOST=unix:///var/run/docker.sock
    group_add:
      - "991"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: BoltDashPi5-frontend
    ports:
      - "3050:3050"
    depends_on:
      - backend
    restart: unless-stopped
