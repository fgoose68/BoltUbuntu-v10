version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-backend
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JWT_SECRET=raspberry_dashboard_secret_key_2024
    restart: unless-stopped
    networks:
      - dashboard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    ports:
      - "3050:3050"
    environment:
      - VITE_API_URL=http://localhost:8001/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge
